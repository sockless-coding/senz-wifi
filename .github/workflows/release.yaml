name: Release

on:
  push:
    tags:
      - "*"

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          python -c "import json; m=json.load(open('custom_components/senz_wifi/manifest.json')); m['version']='${VERSION}'; json.dump(m, open('custom_components/senz_wifi/manifest.json','w'), indent=2)"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            custom_components/senz_wifi/manifest.json
